<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>임시</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, #27343d 0%, #131b21 58%, #0b1014 100%);
      font-family: Pretendard, Arial, sans-serif;
      color: white;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .scene {
      position: relative;
      width: min(1000px, 92vw);
      height: 520px;
      overflow: hidden;
      border-radius: 20px;
      background:
        radial-gradient(circle at 25% 35%, rgba(255,255,255,0.05), transparent 22%),
        linear-gradient(180deg, #23323a 0%, #182128 55%, #10161b 100%);
      box-shadow:
        0 20px 50px rgba(0,0,0,0.35),
        inset 0 0 0 1px rgba(255,255,255,0.05);
    }

    .floor {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 140px;
      background: linear-gradient(180deg, #1e282f 0%, #0d1216 100%);
    }

    .character {
      position: absolute;
      left: 110px;
      top: 130px;
      width: 210px;
      height: 300px;
    }

    .head {
      position: absolute;
      left: 38px;
      top: 0;
      width: 128px;
      height: 146px;
      border-radius: 48% 48% 44% 44%;
      background: linear-gradient(145deg, #ffd9bc, #e9af92);
      border: 4px solid #232324;
      box-shadow:
        inset -10px -10px 18px rgba(129, 66, 41, 0.18),
        0 12px 18px rgba(0, 0, 0, 0.25);
      z-index: 3;
    }

    .hair {
      position: absolute;
      left: -8px;
      top: -10px;
      width: 142px;
      height: 76px;
      background: #252628;
      border-radius: 58% 58% 38% 30%;
    }

    .hair::before,
    .hair::after {
      content: "";
      position: absolute;
      top: 36px;
      width: 38px;
      height: 70px;
      background: #252628;
    }

    .hair::before {
      left: 0;
      border-radius: 45% 20% 50% 35%;
      transform: rotate(8deg);
    }

    .hair::after {
      right: 0;
      border-radius: 20% 45% 35% 50%;
      transform: rotate(-8deg);
    }

    .eye {
      position: absolute;
      top: 72px;
      width: 11px;
      height: 5px;
      border-radius: 999px;
      background: #28211f;
    }

    .eye.left {
      left: 31px;
    }

    .eye.right {
      right: 31px;
    }

    .mouth {
      position: absolute;
      right: -10px;
      top: 96px;
      width: 27px;
      height: 18px;
      border: 4px solid #341b18;
      border-left: 0;
      border-radius: 0 70% 70% 0;
      background: #4e221f;
      transform: rotate(4deg);
      z-index: 8;
    }

    .body {
      position: absolute;
      left: 18px;
      top: 130px;
      width: 165px;
      height: 170px;
      background: linear-gradient(90deg, #2b4153, #44667d 50%, #243845);
      clip-path: polygon(20% 0, 80% 0, 100% 100%, 0 100%);
      border-radius: 38px 38px 14px 14px;
      box-shadow: 0 15px 26px rgba(0,0,0,0.3);
    }

    /* 입냄새 전체 영역 */
    .bad-breath {
      position: absolute;
      left: 155px;   /* 입 위치에 맞춰 조정 */
      top: 48px;     /* 입 위치에 맞춰 조정 */
      width: 520px;
      height: 250px;
      pointer-events: none;
      opacity: 0;
      z-index: 1;
    }

    .character.firing .bad-breath {
      opacity: 1;
    }

    /* 부채꼴 본체 */
    .breath-cone {
      position: absolute;
      left: 0;
      top: 50%;
      width: 100%;
      height: 100%;
      transform: translateY(-50%) scaleX(0.1) scaleY(0.4);
      transform-origin: left center;
      clip-path: polygon(0 47%, 100% 0, 100% 100%, 0 53%);
      background:
        radial-gradient(
          ellipse at left center,
          rgba(236, 255, 96, 0.9) 0%,
          rgba(170, 219, 44, 0.62) 24%,
          rgba(84, 151, 39, 0.36) 53%,
          rgba(31, 70, 27, 0.08) 78%,
          transparent 100%
        );
      filter: blur(8px);
      mix-blend-mode: screen;

      /* 입 쪽이 더 빨리 사라지도록 기본 마스크 */
      -webkit-mask-image: linear-gradient(
        90deg,
        transparent 0%,
        transparent 10%,
        rgba(0,0,0,0.65) 22%,
        rgba(0,0,0,1) 34%,
        rgba(0,0,0,0.92) 78%,
        transparent 100%
      );
      mask-image: linear-gradient(
        90deg,
        transparent 0%,
        transparent 10%,
        rgba(0,0,0,0.65) 22%,
        rgba(0,0,0,1) 34%,
        rgba(0,0,0,0.92) 78%,
        transparent 100%
      );
    }

    .breath-cone::before {
      content: "";
      position: absolute;
      left: 0;
      top: 36%;
      width: 82%;
      height: 28%;
      clip-path: polygon(0 40%, 100% 0, 100% 100%, 0 60%);
      background: linear-gradient(
        90deg,
        rgba(237, 255, 120, 0.78),
        rgba(125, 198, 37, 0.42),
        transparent
      );
      filter: blur(10px);
    }

    /* 입 쪽부터 지워지는 느낌 */
    .source-clear {
      position: absolute;
      left: 0;
      top: 14%;
      width: 0;
      height: 72%;
      opacity: 0;
      background: linear-gradient(
        90deg,
        rgba(16, 22, 27, 0.98) 0%,
        rgba(16, 22, 27, 0.82) 45%,
        rgba(16, 22, 27, 0.0) 100%
      );
      filter: blur(10px);
      z-index: 5;
    }

    /* 연기 덩어리 */
    .puff {
      position: absolute;
      left: 2px;
      top: 50%;
      width: var(--size);
      height: calc(var(--size) * 0.72);
      transform: translate(0, -50%) scale(0.2);
      opacity: 0;
      border-radius: 50%;
      background:
        radial-gradient(
          circle at 35% 35%,
          rgba(241, 255, 137, 0.98),
          rgba(140, 196, 53, 0.72) 42%,
          rgba(58, 108, 36, 0.32) 68%,
          transparent 74%
        );
      filter: blur(4px);
      box-shadow:
        0 0 14px rgba(165, 233, 55, 0.35),
        inset 0 0 10px rgba(255,255,180,0.2);
      z-index: 2;
    }

    /* 작은 입자 */
    .particle {
      position: absolute;
      left: 10px;
      top: calc(50% + var(--startY));
      width: var(--dot);
      height: var(--dot);
      opacity: 0;
      border-radius: 50%;
      background: #dcff5b;
      box-shadow:
        0 0 8px #dfff61,
        0 0 18px rgba(136, 255, 56, 0.6);
      transform: translate(0, 0) scale(0.2);
      z-index: 3;
    }

    /* 버튼 */
    .controls {
      display: flex;
      gap: 10px;
    }

    button {
      border: 0;
      padding: 14px 22px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: linear-gradient(180deg, #8dcf2f, #5b9720);
      box-shadow:
        0 8px 18px rgba(0,0,0,0.25),
        inset 0 0 0 1px rgba(255,255,255,0.15);
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    .label {
      font-size: 15px;
      color: rgba(255,255,255,0.82);
    }

    /* 발사 시 애니메이션 적용 */
    .character.firing .breath-cone {
      animation: coneShot 1.15s ease-out forwards;
    }

    .character.firing .source-clear {
      animation: sourceClear 1.15s ease-out forwards;
    }

    .character.firing .p1 { animation: puffFly 1.05s linear 0s forwards; }
    .character.firing .p2 { animation: puffFly 1.05s linear 0.08s forwards; }
    .character.firing .p3 { animation: puffFly 1.05s linear 0.16s forwards; }
    .character.firing .p4 { animation: puffFly 1.05s linear 0.24s forwards; }
    .character.firing .p5 { animation: puffFly 1.05s linear 0.32s forwards; }

    .character.firing .d1 { animation: particleFly 0.95s linear 0.04s forwards; }
    .character.firing .d2 { animation: particleFly 0.95s linear 0.12s forwards; }
    .character.firing .d3 { animation: particleFly 0.95s linear 0.20s forwards; }
    .character.firing .d4 { animation: particleFly 0.95s linear 0.28s forwards; }
    .character.firing .d5 { animation: particleFly 0.95s linear 0.36s forwards; }
    .character.firing .d6 { animation: particleFly 0.95s linear 0.44s forwards; }

    @keyframes coneShot {
      0% {
        opacity: 0;
        transform: translateY(-50%) scaleX(0.08) scaleY(0.35);
      }
      18% {
        opacity: 0.96;
      }
      55% {
        opacity: 0.9;
      }
      100% {
        opacity: 0;
        transform: translateY(-50%) scaleX(1) scaleY(1);
      }
    }

    /* 입 쪽에서부터 사라지는 wipe */
    @keyframes sourceClear {
      0% {
        width: 0;
        opacity: 0;
      }
      12% {
        opacity: 0.95;
      }
      100% {
        width: 190px;
        opacity: 0.9;
      }
    }

    @keyframes puffFly {
      0% {
        opacity: 0;
        transform: translate(0, -50%) scale(0.18);
      }
      12% {
        opacity: 0.96;
      }
      45% {
        opacity: 0.85;
      }
      100% {
        opacity: 0;
        transform: translate(var(--moveX), calc(-50% + var(--moveY))) scale(var(--scale));
      }
    }

    @keyframes particleFly {
      0% {
        opacity: 0;
        transform: translate(0, 0) scale(0.2);
      }
      15% {
        opacity: 1;
      }
      60% {
        opacity: 0.8;
      }
      100% {
        opacity: 0;
        transform: translate(var(--dotX), var(--dotY)) scale(1.25);
      }
    }

    /* 각 연기/입자 세부값 */
    .p1 { --size: 76px;  --moveX: 390px; --moveY: -74px;  --scale: 1.35; }
    .p2 { --size: 104px; --moveX: 455px; --moveY:  52px;  --scale: 1.6;  }
    .p3 { --size: 84px;  --moveX: 340px; --moveY:  -8px;  --scale: 1.4;  }
    .p4 { --size: 130px; --moveX: 485px; --moveY: 100px;  --scale: 1.75; }
    .p5 { --size: 118px; --moveX: 430px; --moveY: -122px; --scale: 1.65; }

    .d1 { --dot: 8px;  --startY: -10px; --dotX: 300px; --dotY: -90px; }
    .d2 { --dot: 11px; --startY:  15px; --dotX: 345px; --dotY:  78px; }
    .d3 { --dot: 6px;  --startY: -20px; --dotX: 260px; --dotY: -40px; }
    .d4 { --dot: 9px;  --startY:  10px; --dotX: 410px; --dotY: 120px; }
    .d5 { --dot: 7px;  --startY:  -5px; --dotX: 370px; --dotY: -130px; }
    .d6 { --dot: 10px; --startY:   0px; --dotX: 450px; --dotY:  10px; }

    @media (max-width: 800px) {
      .scene {
        height: 430px;
      }

      .character {
        transform: scale(0.82);
        transform-origin: left top;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="scene">
      <div class="floor"></div>

      <div class="character" id="character">
        <div class="head">
          <div class="hair"></div>
          <div class="eye left"></div>
          <div class="eye right"></div>
          <div class="mouth"></div>
        </div>
        <div class="body"></div>

        <div class="bad-breath">
          <div class="breath-cone"></div>
          <div class="source-clear"></div>

          <span class="puff p1"></span>
          <span class="puff p2"></span>
          <span class="puff p3"></span>
          <span class="puff p4"></span>
          <span class="puff p5"></span>

          <span class="particle d1"></span>
          <span class="particle d2"></span>
          <span class="particle d3"></span>
          <span class="particle d4"></span>
          <span class="particle d5"></span>
          <span class="particle d6"></span>
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="fireBtn">입냄새 발사</button>
    </div>
    <div class="label">버튼을 누르면 입에서 광역 입냄새가 뿜어지고, 입 쪽부터 먼저 사라집니다.</div>
  </div>

  <script>
    const character = document.getElementById("character");
    const fireBtn = document.getElementById("fireBtn");
    let timer;

    function fireBreath() {
      clearTimeout(timer);

      character.classList.remove("firing");
      void character.offsetWidth;
      character.classList.add("firing");

      timer = setTimeout(() => {
        character.classList.remove("firing");
      }, 1200);
    }

    fireBtn.addEventListener("click", fireBreath);
  </script>
</body>
</html>
