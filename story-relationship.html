<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인연 스토리 - 독서 RPG</title>
<link rel="icon" href="logoicon.png">
<link rel="stylesheet" href="story/story-relationship.css">
</head>
<body>

<div id="lobby-wrap">
  <div id="lobby-stage">

    <div id="lobby-home" class="lobby-screen show">
      <img id="lobby-cover" src="assets/story/ep1/lobby/cover.jpg" alt="">
      <div id="lobby-title-overlay">
        <div id="lobby-game-title">인연 스토리</div>
      </div>
      <div class="vn-ticket-chip"><img class="vn-ticket-icon" src="assets/items/story_ticket.png" alt="" onerror="this.style.display='none'"> <span id="vn-ticket-value-home">0</span></div>
      <div id="lobby-menu">
        <button class="lobby-btn" id="btn-episodes">Episode 선택</button>
        <button class="lobby-btn" id="btn-gallery">도감</button>
        <button class="lobby-btn" id="btn-exit">나가기</button>
      </div>
    </div>

    <div id="lobby-episodes" class="lobby-screen">
      <div class="lobby-header">
        <button class="lobby-back">◀ 뒤로</button>
        <span class="lobby-header-title">Episode 선택</span>
        <div class="vn-ticket-chip"><img class="vn-ticket-icon" src="assets/items/story_ticket.png" alt="" onerror="this.style.display='none'"> <span id="vn-ticket-value-episodes">0</span></div>
      </div>
      <div class="lobby-episode-grid">
        <div class="episode-card" id="episode-card-1">
          <img src="assets/story/ep1/lobby/episode1_thumb.jpg" alt="">
          <div class="episode-card-label">Episode 1<br><span id="ep1-status">우정의 시작</span></div>
        </div>
        <div class="episode-card locked">
          <div class="episode-card-empty">?</div>
          <div class="episode-card-label">Episode 2<br><span>준비 중</span></div>
        </div>
        <div class="episode-card locked">
          <div class="episode-card-empty">?</div>
          <div class="episode-card-label">Episode 3<br><span>준비 중</span></div>
        </div>
      </div>
    </div>

    <!-- 신규: Episode 카드 클릭 시 바로 시작하지 않고 이 상세 화면으로 진입 -->
    <div id="lobby-episode-detail" class="lobby-screen">
      <div class="lobby-header">
        <button class="lobby-back" id="episode-detail-back-btn">◀ 뒤로</button>
        <span class="lobby-header-title">Episode 1</span>
        <div class="vn-ticket-chip"><img class="vn-ticket-icon" src="assets/items/story_ticket.png" alt="" onerror="this.style.display='none'"> <span id="vn-ticket-value-detail">0</span></div>
      </div>
      <div class="episode-detail-body">
        <div class="episode-detail-title">Episode 1 · 우정의 시작</div>
        <p class="episode-detail-desc">평범한 학교 생활 속, 우연이 겹치며 시작되는 인연 이야기.</p>

        <button class="episode-detail-start-btn" id="episode-detail-start-btn" type="button">시작하기</button>
        <button class="lobby-back" id="episode-detail-restart-btn" type="button" style="display:none;">처음부터 다시 시작</button>

        <div class="vn-autouse-row">
          <div>
            <div class="vn-autouse-label">티켓 자동 사용</div>
            <div class="vn-autouse-sub">켜두면 씬 전환 시 확인 없이 티켓이 바로 소모됩니다.</div>
          </div>
          <label class="vn-switch">
            <input type="checkbox" id="vn-autouse-toggle">
            <span class="vn-switch-track"></span>
          </label>
        </div>
      </div>
    </div>

    <div id="lobby-gallery" class="lobby-screen">
      <div class="lobby-header">
        <button class="lobby-back">◀ 뒤로</button>
        <span class="lobby-header-title">COLLECTION</span>
        <span class="gallery-summary" id="gallery-summary">0 / 11</span>
      </div>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>

    <div id="gallery-modal" aria-hidden="true">
      <div id="gallery-modal-box">
        <div id="gallery-modal-header">
          <div id="gallery-modal-title"></div>
          <button id="gallery-modal-close" aria-label="닫기">✕</button>
        </div>
        <div id="gallery-modal-content"></div>
      </div>
    </div>

  </div>
</div>

<div id="stage">
  <audio id="bgm-player" loop preload="none"></audio>
  <div class="vn-ticket-chip"><img class="vn-ticket-icon" src="assets/items/story_ticket.png" alt="" onerror="this.style.display='none'"> <span id="vn-ticket-value-stage">0</span></div>
  <div id="scene-fade"></div>
  <div id="time-card-overlay" aria-hidden="true">
    <div id="time-card-text"></div>
  </div>
  <div id="bg-mood"></div>
  <div id="bg-vignette"></div>

  <button id="menu-btn">메뉴</button>

  <div id="char-left"><img id="char-left-img" src="" alt=""></div>
  <div id="char-center-left"><img id="char-center-left-img" src="" alt=""></div>
  <div id="char-center-right"><img id="char-center-right-img" src="" alt=""></div>
  <div id="char-right"><img id="char-right-img" src="" alt=""></div>

  <div id="phone-layer">
    <div id="phone-window">
      <div id="phone-header"><span id="phone-icon">♠</span> BugoTalk</div>
      <div id="phone-body">
        <div id="phone-contacts"></div>
        <div id="phone-chat">
          <div id="chat-messages"></div>
          <div id="phone-compose">
            <input id="phone-compose-input" type="text" placeholder="메시지를 입력하세요" maxlength="60">
            <button id="phone-compose-send">전송</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="dialogue-wrap">
    <div id="nameplate">
      <span id="name-main"></span>
      <span class="sub" id="name-sub"></span>
    </div>
    <div id="box">
      <div id="line-text"></div>
      <div id="advance-hint">클릭해서 계속 ▶</div>
    </div>
  </div>

  <div id="choice-layer"></div>

  <div id="end-layer">
    <h2 id="end-title">씬 종료</h2>
    <div class="affection" id="end-affection"></div>
    <button id="restart-btn">로비로</button>
  </div>
</div>

<!-- 신규: 씬 전환 티켓 확인 모달 -->
<div class="vn-ticket-modal" id="vn-ticket-confirm-modal">
  <div class="vn-ticket-modal-box">
    <div class="vn-ticket-modal-text">티켓을 사용하여<br>이어서 보시겠습니까?</div>
    <div class="vn-ticket-modal-btns">
      <button class="vn-ticket-modal-btn primary" id="vn-ticket-confirm-ok">확인</button>
      <button class="vn-ticket-modal-btn" id="vn-ticket-confirm-cancel">취소</button>
    </div>
  </div>
</div>

<!-- 신규: 티켓 부족 모달 -->
<div class="vn-ticket-modal" id="vn-ticket-insufficient-modal">
  <div class="vn-ticket-modal-box">
    <div class="vn-ticket-modal-text">티켓이 부족합니다</div>
    <div class="vn-ticket-modal-btns">
      <button class="vn-ticket-modal-btn primary" id="vn-ticket-insufficient-ok">확인</button>
    </div>
  </div>
</div>

<!-- 신규: 스토리 진행 중 메뉴 모달 -->
<div class="vn-ticket-modal" id="vn-menu-modal">
  <div class="vn-ticket-modal-box">
    <div class="vn-menu-title">메뉴</div>
    <div class="vn-ticket-modal-btns">
      <button class="vn-ticket-modal-btn primary" id="vn-menu-resume">이어하기</button>
      <button class="vn-ticket-modal-btn" id="vn-menu-save-exit">저장 및 종료</button>
    </div>
  </div>
</div>

<!-- 신규: 티켓 자동 사용 켤 때 1회 안내 모달 -->
<div class="vn-ticket-modal" id="vn-autouse-info-modal">
  <div class="vn-ticket-modal-box">
    <div class="vn-ticket-modal-text">다음 씬으로 넘어갈 때<br>티켓이 자동으로 소모됩니다.</div>
    <div class="vn-ticket-modal-btns">
      <button class="vn-ticket-modal-btn primary" id="vn-autouse-info-ok">확인</button>
    </div>
  </div>
</div>

<script src="shared/api-config.js"></script>
<script src="shared/session-guard.js"></script>
<script src="shared/nav-lock.js"></script>
<script src="story/story-engine.js"></script>
</body>
</html>
