<div class="enhancement-shell">
    <header class="enhancement-header">
        <div>
            <h2 class="enhancement-title">캐릭터 강화</h2>
            <p class="enhancement-subtitle">
                같은 캐릭터 + 같은 성급 3장을 합성해 다음 성급에 도전합니다.
            </p>
        </div>

        <div class="enhancement-gold-chip">
            G <span id="enhancement-gold-value">-</span>
        </div>
    </header>

    <div class="enhancement-layout">
        <section class="enhancement-character-section">
            <div class="enhancement-section-heading">
                <strong>강화할 캐릭터 선택</strong>
                <span>정렬: 성능 순</span>
            </div>

            <div class="enhancement-character-scroll">
                <div
                    class="enhancement-character-grid"
                    id="enhancement-character-grid"
                ></div>

                <p
                    class="enhancement-empty"
                    id="enhancement-empty"
                    hidden
                ></p>
            </div>
        </section>

        <section class="enhancement-machine">
            <div class="enhancement-preview-row">
                <div class="enhancement-preview-card">
                    <span class="enhancement-preview-label">현재</span>

                    <div class="enhancement-preview-portrait">
                        <img
                            id="enhancement-current-image"
                            src=""
                            alt=""
                        >
                        <div
                            class="enhancement-preview-stars"
                            id="enhancement-current-stars"
                        >-</div>
                    </div>

                    <strong id="enhancement-current-name">
                        캐릭터를 선택하세요
                    </strong>

                    <span id="enhancement-current-count">
                        보유 수량 -
                    </span>
                </div>

                <div class="enhancement-arrow">
                    <span>➜</span>
                    <small>강화</small>
                </div>

                <div class="enhancement-preview-card target">
                    <span class="enhancement-preview-label">목표</span>

                    <div class="enhancement-preview-portrait">
                        <img
                            id="enhancement-target-image"
                            src=""
                            alt=""
                        >
                        <div
                            class="enhancement-preview-stars"
                            id="enhancement-target-stars"
                        >-</div>
                    </div>

                    <strong id="enhancement-target-name">
                        다음 성급
                    </strong>

                    <span id="enhancement-required-count">
                        같은 카드 3장 필요
                    </span>
                </div>
            </div>

            <div class="enhancement-rule-panel">
                <div class="enhancement-rule-row">
                    <span>성공</span>
                    <strong
                        class="success"
                        id="enhancement-success-rate"
                    >-</strong>
                </div>

                <div class="enhancement-rule-row">
                    <span>유지</span>
                    <strong
                        class="maintain"
                        id="enhancement-maintain-rate"
                    >-</strong>
                </div>

                <div class="enhancement-rule-row">
                    <span>파괴</span>
                    <strong
                        class="destroy"
                        id="enhancement-destroy-rate"
                    >-</strong>
                </div>

                <div class="enhancement-rule-divider"></div>

                <div class="enhancement-rule-row cost">
                    <span>필요 골드</span>
                    <strong id="enhancement-cost">-</strong>
                </div>
            </div>

            <!-- 선택된 강화 아이템 요약 (없으면 숨김) -->
            <div class="enhancement-selected-items" id="enhancement-selected-items" hidden></div>

            <p class="enhancement-warning" id="enhancement-warning">
                강화할 캐릭터를 선택하세요.
            </p>

            <div class="enhancement-action-row">
                <button
                    class="enhancement-item-button"
                    id="enhancement-item-button"
                    type="button"
                >
                    강화 아이템 사용
                </button>

                <button
                    class="enhancement-submit-button shine"
                    id="enhancement-submit-button"
                    type="button"
                    disabled
                >
                    강화하기
                </button>
            </div>
        </section>
    </div>
</div>

<!-- 강화 아이템 선택 모달 -->
<div
    class="enhancement-inner-overlay"
    id="enhancement-item-modal"
    hidden
>
    <div class="enhancement-inner-box enhancement-item-box">
        <button
            class="enhancement-inner-close"
            id="enhancement-item-close"
            type="button"
        >✕</button>

        <h3>강화 아이템 사용</h3>
        <p class="enhancement-item-hint">
            서로 다른 아이템은 같이 쓸 수 있어요. 같은 아이템은 하나만 선택돼요.
        </p>

        <div class="enhancement-item-list" id="enhancement-item-list"></div>
        <p class="enhancement-item-empty" id="enhancement-item-empty" hidden>
            보유한 강화 아이템이 없습니다. 상점에서 구매해주세요.
        </p>

        <button
            class="enhancement-item-apply"
            id="enhancement-item-apply"
            type="button"
        >
            선택 완료
        </button>
    </div>
</div>

<!-- alert가 아닌 강화 화면 내부 모달 -->
<div
    class="enhancement-inner-overlay"
    id="enhancement-result-modal"
    hidden
>
    <div class="enhancement-inner-box enhancement-result-box">
        <div
            class="enhancement-result-emblem"
            id="enhancement-result-emblem"
        >★</div>

        <h3 id="enhancement-result-title">강화 결과</h3>
        <p id="enhancement-result-message">-</p>

        <button
            class="enhancement-result-confirm"
            id="enhancement-result-confirm"
            type="button"
        >
            확인
        </button>
    </div>
</div>
