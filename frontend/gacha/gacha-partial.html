<div class="gacha-title-row">
    <h2 class="screen-title" id="gacha-title">모집</h2>
    <button type="button" id="gacha-rate-info-btn" class="gacha-info-btn" title="인물별 획득 확률 보기">i</button>
</div>

<!-- 배너 캐러셀 -->
<div class="gacha-banner-carousel" id="gacha-banner-carousel"></div>

<!-- 선택된 배너에 따라 -->
<div class="gacha-banner-detail" id="gacha-banner-detail">
    <div class="gacha-pickup-rate-text" id="gacha-pickup-rate-text" hidden></div>
    <span class="gacha-period" id="gacha-period-text">불러오는 중...</span>
</div>

<!-- 메인 -->
<div id="gacha-main-view">
    <button id="gacha-pull-btn" class="dungeon-enter-btn shine">모집 (100G)</button>

    <div class="gacha-point-row">
        <div class="gacha-point-chip">
            <span class="gacha-point-label">모집 포인트</span>
            <span id="gacha-point-value">-</span>
        </div>
        <button id="gacha-select-open-btn" class="gacha-select-btn">인물 선택</button>
    </div>

    <p class="screen-placeholder gacha-note">
        * 확률형 아이템 규제 법안에 따라 확률을 투명하게 공개하고 있습니다.
    </p>
</div>

<div id="gacha-select-view" hidden>
    <button id="gacha-select-back-btn" class="gacha-back-btn">← 뒤로</button>
    <div id="gacha-pickup-list" class="gacha-pickup-list"></div>
</div>

<div id="gacha-rate-modal" class="gacha-rate-modal" hidden>
    <div class="gacha-rate-modal-box">
        <button type="button" id="gacha-rate-modal-close" class="gacha-rate-modal-close">x</button>
        <h3 class="gacha-rate-modal-title">획득 확률</h3>
        <p id="gacha-rate-pickup-notice" class="gacha-rate-pickup-notice" hidden>픽업모집은 확률 3배입니다</p>
        <div id="gacha-rate-list" class="gacha-rate-list"></div>
    </div>
</div>
